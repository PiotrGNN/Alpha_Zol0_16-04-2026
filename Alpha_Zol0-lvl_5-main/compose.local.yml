services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paid_beta
      POSTGRES_USER: paid_beta
      POSTGRES_PASSWORD: paid_beta_local
    volumes:
      - paid_beta_postgres_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paid_beta -d paid_beta"]
      interval: 5s
      timeout: 5s
      retries: 20
    profiles: ["local"]

  mailpit:
    image: axllent/mailpit:v1.20
    expose:
      - "1025"
      - "8025"
    ports:
      - "127.0.0.1:8025:8025"
    profiles: ["local"]

  migrate:
    environment:
      PAID_BETA_ENV: development
      PAID_BETA_DATABASE_URL: postgresql://paid_beta:paid_beta_local@postgres:5432/paid_beta
      PAID_BETA_TOKEN_SECRET: local-development-token-secret-at-least-32
      PAID_BETA_APP_URL: http://localhost:8080
      PAID_BETA_CORS_ORIGINS: http://localhost:8080
      PAID_BETA_ALLOW_ADMIN_BOOTSTRAP: "0"
      PAID_BETA_EXPOSE_PASSWORD_RESET_TOKEN: "1"
      STRIPE_SECRET_KEY: sk_test_local_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_local_placeholder
      STRIPE_PRICE_STARTER: price_local_starter
      STRIPE_PRICE_PRO: price_local_pro
      STRIPE_PRICE_REPORT: price_local_report
      PAID_BETA_SMTP_HOST: mailpit
      PAID_BETA_SMTP_PORT: "1025"
      PAID_BETA_SMTP_FROM: no-reply@localhost.test
      PAID_BETA_SMTP_STARTTLS: "0"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    environment:
      PAID_BETA_ENV: development
      PAID_BETA_DATABASE_URL: postgresql://paid_beta:paid_beta_local@postgres:5432/paid_beta
      PAID_BETA_TOKEN_SECRET: local-development-token-secret-at-least-32
      PAID_BETA_APP_URL: http://localhost:8080
      PAID_BETA_CORS_ORIGINS: http://localhost:8080
      PAID_BETA_ALLOW_ADMIN_BOOTSTRAP: "0"
      PAID_BETA_EXPOSE_PASSWORD_RESET_TOKEN: "1"
      STRIPE_SECRET_KEY: sk_test_local_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_local_placeholder
      STRIPE_PRICE_STARTER: price_local_starter
      STRIPE_PRICE_PRO: price_local_pro
      STRIPE_PRICE_REPORT: price_local_report
      PAID_BETA_SMTP_HOST: mailpit
      PAID_BETA_SMTP_PORT: "1025"
      PAID_BETA_SMTP_FROM: no-reply@localhost.test
      PAID_BETA_SMTP_STARTTLS: "0"
    volumes:
      - ${PAID_BETA_TRADING_SCORECARD_FILE:-./analysis/local-empty-scorecard.json}:/app/analysis/zol0_profitability_audit_scorecard.json:ro

  gateway:
    environment:
      ZOLO_SITE_ADDRESS: http://localhost:8080
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  paid_beta_postgres_local:
