# Exclude test_output.txt from pytest discovery
[pytest]
norecursedirs = .git .venv __pycache__
# Ignore binary or duplicated content and the nested duplicate project folder
addopts = --ignore=test_output.txt --ignore=Alpha_Zol0-lvl_5-main/Alpha_Zol0-lvl_5-main --ignore=D:/Alpha_Zol0-lvl_5-main/Alpha_Zol0-lvl_5-main --ignore=D:/Alpha_Zol0-lvl_5-main/Alpha_Zol0-lvl_5-main/test_output.txt
# Only discover tests in the top-level 'tests' directory to avoid nested duplicates
testpaths = tests
markers =
    slow: tests that are expensive and must be opted into explicitly
    manual: tests that validate end-to-end or full-corpus behavior outside CI
filterwarnings =
    ignore:System time is way off .*:urllib3.connection.SystemTimeWarning
