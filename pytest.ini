python_files = test_*.py *_test.py
norecursedirs = .git .venv .pytest_cache .mypy_cache .ruff_cache __pycache__ audit_snapshots _rc_extract tmp tmpziptest2 tmpziptest3 tmpziptest4 notebooklm_export .tox
