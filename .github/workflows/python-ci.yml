name: Python CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f Alpha_Zol0-lvl_5-main/requirements.txt ]; then pip install -r Alpha_Zol0-lvl_5-main/requirements.txt; fi
          if [ -f Alpha_Zol0-lvl_5-main/requirements-paid-beta.txt ]; then pip install -r Alpha_Zol0-lvl_5-main/requirements-paid-beta.txt; fi
          python -m pip install pytest

      - name: Compile check for core modules
        run: |
          if [ -d core ]; then python -m compileall -q core; fi
          if [ -d Alpha_Zol0-lvl_5-main/core ]; then python -m compileall -q Alpha_Zol0-lvl_5-main/core; fi

      - name: Run tests
        run: |
          python -m pytest -q \
            --ignore=Alpha_Zol0-lvl_5-main/tests/test_edge_history_accumulation_root_cause.py \
            --ignore=Alpha_Zol0-lvl_5-main/tests/test_edge_history_linkage_redesign_plan.py \
            --ignore=Alpha_Zol0-lvl_5-main/tests/test_edge_history_readiness_impact_audit.py \
            --ignore=Alpha_Zol0-lvl_5-main/tests/test_profitability_audit_scorecard.py \
            --ignore=Alpha_Zol0-lvl_5-main/tests/test_proxy_final_decision_audit.py \
            --ignore=Alpha_Zol0-lvl_5-main/tests/test_proxy_readiness_shadow_only.py \
            --ignore=Alpha_Zol0-lvl_5-main/tests/test_proxy_shadow_realized_agreement_audit.py \
            --ignore=Alpha_Zol0-lvl_5-main/tests/test_proxy_shadow_realized_agreement_expanded.py \
            --ignore=Alpha_Zol0-lvl_5-main/tests/test_readiness_model_redesign_plan.py

  level-omega-regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Alpha_Zol0-lvl_5-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install pytest

      - name: Compile LEVEL-Ω regression targets
        run: |
          python -m py_compile \
            utils/health_check.py \
            core/MarketDataFetcher.py \
            core/BotCore.py \
            portfolio/PortfolioNFT.py \
            core/PositionManager.py \
            platforms/MetaPlatformManager.py \
            platforms/kucoin_websocket_adapter.py \
            api_status.py \
            tests/test_health_check_runtime.py \
            tests/test_kucoin_websocket_adapter.py \
            tests/test_portfolio_nft_integration.py \
            tests/test_meta_platform_manager_runtime.py \
            tests/test_paper_bot_loop_offline.py \
            tests/test_marketdata_fetcher.py \
            tests/test_health_sanity.py

      - name: Run LEVEL-Ω regression tests
        run: |
          python -m pytest \
            tests/test_health_check_runtime.py \
            tests/test_kucoin_websocket_adapter.py \
            tests/test_portfolio_nft_integration.py \
            tests/test_meta_platform_manager_runtime.py \
            tests/test_paper_bot_loop_offline.py \
            tests/test_marketdata_fetcher.py \
            tests/test_health_sanity.py \
            tests/test_position_manager_contracts.py \
            tests/test_position_manager_sync_integrity.py \
            tests/test_position_manager_null_price_close.py \
            tests/test_exchange_kucoin_only.py \
            -q
