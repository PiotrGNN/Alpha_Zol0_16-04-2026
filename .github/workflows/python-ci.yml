name: Python CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f Alpha_Zol0-lvl_5-main/requirements.txt ]; then pip install -r Alpha_Zol0-lvl_5-main/requirements.txt; fi
          python -m pip install pytest

      - name: Compile check for core modules
        run: |
          if [ -d core ]; then python -m compileall -q core; fi
          if [ -d Alpha_Zol0-lvl_5-main/core ]; then python -m compileall -q Alpha_Zol0-lvl_5-main/core; fi

      - name: Run tests
        run: python -m pytest -q